[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file as a
# standalone script, false otherwise
# standalone_mode = false

# enable multiple heads
# multiple_heads = false

# set to 'true' to run the migration directives
# interactively
# interactive_mode = false

# set to 'true' to use batch mode for SQLite
# migrations
# batch_mode = false

# set to 'true' to generate relative migration
# file paths
# relative_location = false

# Database URL - will be set from environment
sqlalchemy.url = postgresql+asyncpg://user:password@localhost/financial_auditor

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file as a
# standalone script, false otherwise
# standalone_mode = false

# enable multiple heads
# multiple_heads = false

# set to 'true' to run the migration directives
# interactively
# interactive_mode = false

# set to 'true' to use batch mode for SQLite
# migrations
# batch_mode = false

# set to 'true' to generate relative migration
# file paths
# relative_location = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
qualname =

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S