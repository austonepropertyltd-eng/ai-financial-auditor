<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h2>VFG TaxRecon AI</h2>

<input type="file" id="file">
<button onclick="analyze()">Analyze</button>

<h3>Total: <span id="total"></span></h3>
<h3>Average: <span id="avg"></span></h3>
<h3>Transactions: <span id="trx"></span></h3>
<h3>VAT: <span id="vat"></span></h3>
<h3>WHT: <span id="wht"></span></h3>
<h3>CIT: <span id="cit"></span></h3>

<p id="aiInsight"></p>

<hr>

<h3>Make Payment</h3>
<input id="payEmail" placeholder="Email">
<input id="amount" placeholder="Amount">

<button onclick="pay()">Pay</button>

<script>

async function analyze() {
    const fileInput = document.getElementById("file");
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    let res = await fetch("https://YOUR_BACKEND_URL/analyze", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    document.getElementById("total").innerText = "₦" + data.total;
    document.getElementById("avg").innerText = "₦" + data.average;
    document.getElementById("trx").innerText = data.transactions;
    document.getElementById("vat").innerText = "₦" + data.vat;
    document.getElementById("wht").innerText = "₦" + data.wht;
    document.getElementById("cit").innerText = "₦" + data.cit;

    document.getElementById("aiInsight").innerText = data.ai_insight;
}

async function pay() {
    const formData = new FormData();
    formData.append("email", document.getElementById("payEmail").value);
    formData.append("amount", document.getElementById("amount").value);

    let res = await fetch("https://YOUR_BACKEND_URL/pay", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    window.location.href = data.data.authorization_url;
}

</script>

</body>
</html>
