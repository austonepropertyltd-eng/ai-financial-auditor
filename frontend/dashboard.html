<!DOCTYPE html>
<html>
<head>
    <title>VFG TaxRecon AI</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h1>🚀 VFG TaxRecon AI Dashboard</h1>

<input type="file" id="file">
<button id="analyzeBtn" onclick="analyze()">Analyze</button>

<h3>Total: <span id="total">0</span></h3>
<h3>Average: <span id="avg">0</span></h3>
<h3>Transactions: <span id="trx">0</span></h3>
<h3>VAT: <span id="vat">0</span></h3>
<h3>WHT: <span id="wht">0</span></h3>
<h3>CIT: <span id="cit">0</span></h3>

<h2>🤖 AI Insight</h2>
<pre id="aiInsight"></pre>

<script>
async function analyze() {
    const fileInput = document.getElementById("file");
    const btn = document.getElementById("analyzeBtn");

    if (!fileInput.files[0]) {
        alert("Upload file first");
        return;
    }

    btn.innerText = "Analyzing...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const response = await fetch("https://vfg-taxrecon.onrender.com/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById("total").innerText = "₦" + data.total.toLocaleString();
        document.getElementById("avg").innerText = "₦" + data.average.toLocaleString();
        document.getElementById("trx").innerText = data.transactions;
        document.getElementById("vat").innerText = "₦" + data.vat.toLocaleString();
        document.getElementById("wht").innerText = "₦" + data.wht.toLocaleString();
        document.getElementById("cit").innerText = "₦" + data.cit.toLocaleString();

        document.getElementById("aiInsight").innerText = data.ai_insight;

    } catch (error) {
        alert("Error connecting to server");
        console.error(error);
    }

    btn.innerText = "Analyze";
    btn.disabled = false;
}
</script>

</body>
</html>
