<!DOCTYPE html>
<html>
<head>
    <title>VFG TaxRecon Dashboard</title>
    <style>
        body {
            background: #0b0f1a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .top-bar {
            margin: 20px;
        }

        button {
            background: #00ff66;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #121a2b;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
        }
    </style>
</head>

<body>

<h1>VFG TaxRecon Dashboard</h1>

<div class="top-bar">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Analyze</button>
</div>

<div class="cards">
    <div class="card"><h3>Total</h3><p id="total">0</p></div>
    <div class="card"><h3>Average</h3><p id="average">0</p></div>
    <div class="card"><h3>Transactions</h3><p id="transactions">0</p></div>
    <div class="card"><h3>VAT</h3><p id="vat">0</p></div>
</div>

<div class="cards">
    <div class="card"><h3>WHT</h3><p id="wht">0</p></div>
    <div class="card"><h3>CIT</h3><p id="cit">0</p></div>
</div>

<h2>AI Insight</h2>

<script>
function money(v) {
    return "₦" + Number(v).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

async function uploadFile() {
    const fileInput = document.getElementById("fileInput");

    if (!fileInput.files.length) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("https://vfg-taxrecon.onrender.com/api/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!data || data.error) {
            alert(data?.error || "Something went wrong");
            return;
        }

        document.getElementById("total").innerText = money(data.total);
        document.getElementById("average").innerText = money(data.average);
        document.getElementById("transactions").innerText = data.transactions;
        document.getElementById("vat").innerText = money(data.vat);
        document.getElementById("wht").innerText = money(data.wht);
        document.getElementById("cit").innerText = money(data.cit);

    } catch (err) {
        alert("Error connecting to backend");
    }
}
</script>

</body>
</html>
