<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VFG TaxRecon AI Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .top-bar {
            margin-bottom: 20px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 20px;
            color: black;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .card p {
            font-size: 22px;
            margin-top: 10px;
        }

        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

        .insights {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🚀 VFG TaxRecon AI Dashboard</h1>

<div class="top-bar">
    <input type="file" id="fileInput">
    <button onclick="uploadFile(event)" id="analyzeBtn">Analyze</button>
</div>

<!-- METRIC CARDS -->
<div class="cards">
    <div class="card"><h3>Total</h3><p id="total">0</p></div>
    <div class="card"><h3>Average</h3><p id="average">0</p></div>
    <div class="card"><h3>Transactions</h3><p id="periods">0</p></div>
    <div class="card"><h3>VAT</h3><p id="vat">0</p></div>
</div>

<div class="cards">
    <div class="card"><h3>WHT</h3><p id="wht">0</p></div>
    <div class="card"><h3>CIT</h3><p id="cit">0</p></div>
</div>

<!-- CHARTS -->
<div class="charts">
    <canvas id="barChart"></canvas>
    <canvas id="pieChart"></canvas>
</div>

<!-- INSIGHTS -->
<div class="insights">
    <h3>🧠 AI Insights</h3>
    <p id="insights">No data yet</p>
</div>

<script>
let barChart, pieChart;

function formatMoney(value) {
    return "₦" + Number(value).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const button = document.getElementById("analyzeBtn");

    if (!fileInput.files.length) {
        alert("Select a file first");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        button.innerText = "Processing...";
        button.disabled = true;

        const response = await fetch("https://vfg-taxrecon.onrender.com/upload") {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (data.error) {
            alert(data.error);
            return;
        }

        // =====================
        // UPDATE UI
        // =====================
        document.getElementById("total").innerText = formatMoney(data.total);
        document.getElementById("average").innerText = formatMoney(data.average);
        document.getElementById("periods").innerText = data.periods;
        document.getElementById("vat").innerText = formatMoney(data.vat);
        document.getElementById("wht").innerText = formatMoney(data.wht);
        document.getElementById("cit").innerText = formatMoney(data.cit);

        document.getElementById("insights").innerText =
            `High Value: ${data.insights.high_value_transactions} | 
             Suspicious: ${data.insights.suspicious_transactions} | 
             Cashflow: ${data.insights.cashflow_health}`;

        // =====================
        // BAR CHART
        // =====================
        if (barChart) barChart.destroy();

        barChart = new Chart(document.getElementById("barChart"), {
            type: "bar",
            data: {
                labels: ["Total", "VAT", "WHT", "CIT"],
                datasets: [{
                    label: "Amount",
                    data: [data.total, data.vat, data.wht, data.cit]
                }]
            }
        });

        // =====================
        // PIE CHART
        // =====================
        if (pieChart) pieChart.destroy();

        pieChart = new Chart(document.getElementById("pieChart"), {
            type: "pie",
            data: {
                labels: ["VAT", "WHT", "CIT"],
                datasets: [{
                    data: [data.vat, data.wht, data.cit]
                }]
            }
        });

    } catch (error) {
        console.error(error);
        alert("Error connecting to backend");
    } finally {
        button.innerText = "Analyze";
        button.disabled = false;
    }
}
</script>

</body>
</html>
