<!DOCTYPE html>
<html>
<head>
<title>VFG TaxRecon AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0b0f1a, #121826);
    color: white;
    font-family: Arial;
    padding: 30px;
}

h1 {
    color: #5ce1e6;
}

.card {
    background: #1c2333;
    padding: 20px;
    border-radius: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

button {
    background: #5ce1e6;
    padding: 10px;
    border: none;
    cursor: pointer;
}

#loginBox {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>🚀 VFG TaxRecon AI Dashboard</h1>

<!-- LOGIN -->
<div id="loginBox">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- FILE -->
<input type="file" id="file">
<button onclick="upload()">Analyze</button>
<button onclick="downloadPDF()">Download PDF</button>

<div class="grid">
    <div class="card">Total: <span id="total">0</span></div>
    <div class="card">Average: <span id="avg">0</span></div>
    <div class="card">Transactions: <span id="trx">0</span></div>
    <div class="card">VAT: <span id="vat">0</span></div>
    <div class="card">WHT: <span id="wht">0</span></div>
    <div class="card">CIT: <span id="cit">0</span></div>
</div>

<canvas id="chart"></canvas>

<h2>🤖 AI Insight</h2>
<p id="insight">No insight yet</p>

<script>

let chart;

function login(){
    alert("Login simulated (connect backend later)");
}

function money(v){
    return "₦" + Number(v).toLocaleString();
}

async function upload(){

    const file = document.getElementById("file").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://vfg-taxrecon.onrender.com/api/upload",{
        method:"POST",
        body:formData
    });

    const data = await res.json();

    document.getElementById("total").innerText = money(data.total);
    document.getElementById("avg").innerText = money(data.average);
    document.getElementById("trx").innerText = data.transactions;
    document.getElementById("vat").innerText = money(data.vat);
    document.getElementById("wht").innerText = money(data.wht);
    document.getElementById("cit").innerText = money(data.cit);

    document.getElementById("insight").innerText = data.insight;

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:["Total","VAT","WHT","CIT"],
            datasets:[{
                data:[data.total,data.vat,data.wht,data.cit]
            }]
        }
    });
}

function downloadPDF(){
    window.open("https://vfg-taxrecon.onrender.com/api/report");
}

</script>

</body>
</html>
