<!DOCTYPE html>
<html>
<head>
<title>VFG TaxRecon AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    padding: 20px;
}

h1 { color: #5ce1e6; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1c2333;
    padding: 20px;
    border-radius: 10px;
}

button {
    background: #5ce1e6;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🚀 VFG TaxRecon AI Dashboard</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<br><br>

<!-- FILE -->
<input type="file" id="file">
<button onclick="upload()">Analyze</button>
<button onclick="downloadPDF()">Download PDF</button>

<div class="grid">
    <div class="card">Total: <span id="total">0</span></div>
    <div class="card">Average: <span id="avg">0</span></div>
    <div class="card">Transactions: <span id="trx">0</span></div>
    <div class="card">VAT: <span id="vat">0</span></div>
    <div class="card">WHT: <span id="wht">0</span></div>
    <div class="card">CIT: <span id="cit">0</span></div>
</div>

<canvas id="chart"></canvas>

<h2>🤖 AI Insight</h2>
<p id="insight">No insight yet</p>

<script>

const API = "https://vfg-taxrecon.onrender.com/api/upload"; // 🔥 REPLACE THIS

let chart;

function money(v){
    return "₦" + Number(v).toLocaleString();
}

async function login(){
    const res = await fetch(API + "/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    if(res.ok) alert("Login successful");
    else alert("Invalid login");
}

async function upload(){

    document.getElementById("insight").innerText = "Analyzing...";

    const file = document.getElementById("file").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(API + "/api/upload",{
        method:"POST",
        body:formData
    });

    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    document.getElementById("total").innerText = money(data.total);
    document.getElementById("avg").innerText = money(data.average);
    document.getElementById("trx").innerText = data.transactions;
    document.getElementById("vat").innerText = money(data.vat);
    document.getElementById("wht").innerText = money(data.wht);
    document.getElementById("cit").innerText = money(data.cit);

    document.getElementById("insight").innerText = data.insight || "No AI insight";

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:["Total","VAT","WHT","CIT"],
            datasets:[{
                label:"Financial Data",
                data:[data.total,data.vat,data.wht,data.cit]
            }]
        }
    });
}

function downloadPDF(){
    window.open(API + "/api/report");
}

</script>

</body>
</html>
