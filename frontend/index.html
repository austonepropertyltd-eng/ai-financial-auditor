<!DOCTYPE html>
<html>
<head>
    <title>VFG TaxRecon AI Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            padding: 30px;
        }

        h1 {
            color: #5ce1e6;
        }

        .top {
            margin-bottom: 20px;
        }

        input, button {
            padding: 10px;
            margin-right: 10px;
        }

        button {
            background: #5ce1e6;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            opacity: 0.6;
        }

        #loading {
            display: none;
            color: yellow;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #121826;
            padding: 20px;
            border-radius: 10px;
        }

        .card span {
            display: block;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        #insight-box {
            margin-top: 40px;
            background: #121826;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🚀 VFG TaxRecon AI Dashboard</h1>

    <p>
        Upload your financial transactions (Excel file) to analyze revenue, taxes,
        and get intelligent financial insights.
    </p>

    <div class="top">
        <input type="file" id="file">
        <button onclick="uploadFile()" id="btn">Analyze</button>
    </div>

    <p id="loading">⏳ Processing file... please wait</p>

    <div class="cards">
        <div class="card">Total <span id="total">0</span></div>
        <div class="card">Average <span id="average">0</span></div>
        <div class="card">Transactions <span id="transactions">0</span></div>
        <div class="card">VAT <span id="vat">0</span></div>
        <div class="card">WHT <span id="wht">0</span></div>
        <div class="card">CIT <span id="cit">0</span></div>
    </div>

    <div id="insight-box">
        <h2>AI Insight</h2>
        <p id="insight">Upload a file to see intelligent analysis...</p>
    </div>

    <script>

        function money(value) {
            return "₦" + Number(value).toLocaleString();
        }

        function generateInsight(data) {
            let insight = "";

            if (data.total > 1000000) {
                insight += "📈 Strong revenue performance detected. ";
            }

            if (data.vat > 500000) {
                insight += "⚠️ High VAT liability — ensure compliance. ";
            }

            if (data.transactions < 50) {
                insight += "📉 Low transaction volume — growth opportunity. ";
            }

            if (!insight) {
                insight = "✅ Financial performance looks stable.";
            }

            return insight;
        }

        async function uploadFile() {

            const fileInput = document.getElementById("file");
            const loading = document.getElementById("loading");
            const btn = document.getElementById("btn");

            if (!fileInput.files.length) {
                alert("Please select a file");
                return;
            }

            // UI feedback
            loading.style.display = "block";
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const res = await fetch("https://vfg-taxrecon.onrender.com/api/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                document.getElementById("total").innerText = money(data.total || 0);
                document.getElementById("average").innerText = money(data.average || 0);
                document.getElementById("transactions").innerText = data.transactions || 0;
                document.getElementById("vat").innerText = money(data.vat || 0);
                document.getElementById("wht").innerText = money(data.wht || 0);
                document.getElementById("cit").innerText = money(data.cit || 0);

                document.getElementById("insight").innerText = generateInsight(data);

            } catch (error) {
                alert("Error connecting to backend");
            }

            // Reset UI
            loading.style.display = "none";
            btn.innerText = "Analyze";
            btn.disabled = false;
        }

    </script>

</body>
</html>
